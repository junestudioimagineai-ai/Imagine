<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Imagine Studio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container { max-width: 1400px; margin: 100px auto 0; padding: 2rem; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; box-shadow: var(--shadow-md); }
        .stat-card h3 { font-size: 2rem; color: var(--primary-color); margin-bottom: 0.5rem; }
        .section-card { background: var(--card-bg); padding: 2rem; border-radius: 12px; box-shadow: var(--shadow-md); margin-bottom: 2rem; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .data-table th, .data-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        .data-table th { background: var(--bg-tertiary); font-weight: 600; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.875rem; font-weight: 600; }
        .badge-pending { background: var(--warning-color); color: white; }
        .badge-completed { background: var(--success-color); color: white; }
        .action-btn { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; margin-right: 0.5rem; }
        .btn-approve { background: var(--success-color); color: white; }
        .btn-reject { background: var(--danger-color); color: white; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="logo.png" alt="Imagine Logo" onerror="this.style.display='none'">
                <span>Imagine<span class="highlight">Studio</span> Admin</span>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>
                <button class="btn btn-outline" onclick="window.location.href='index.html'">Back to Site</button>
                <button class="btn btn-outline" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <p>Welcome, <span id="admin-name"></span></p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="total-users">0</h3>
                <p>Total Users</p>
            </div>
            <div class="stat-card">
                <h3 id="total-orders">0</h3>
                <p>Total Orders</p>
            </div>
            <div class="stat-card">
                <h3 id="pending-orders">0</h3>
                <p>Pending Orders</p>
            </div>
            <div class="stat-card">
                <h3>$<span id="total-revenue">0.00</span></h3>
                <p>Total Revenue</p>
            </div>
        </div>

        <div class="section-card">
            <h2>User Management</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Business Name</th>
                        <th>Balance</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-table"></tbody>
            </table>
        </div>

        <div class="section-card">
            <h2>Orders</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>User</th>
                        <th>Service</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="orders-table"></tbody>
            </table>
        </div>

        <div class="section-card">
            <h2>Add Funds to User</h2>
            <form onsubmit="addFunds(event)" style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 1rem; align-items: end;">
                <div>
                    <label>Select User</label>
                    <select id="fund-user" required style="width: 100%; padding: 0.75rem; border: 2px solid var(--border-color); border-radius: 8px;"></select>
                </div>
                <div>
                    <label>Amount ($)</label>
                    <input type="number" id="fund-amount" min="1" step="0.01" required style="width: 100%; padding: 0.75rem; border: 2px solid var(--border-color); border-radius: 8px;">
                </div>
                <div>
                    <label>Note</label>
                    <input type="text" id="fund-note" placeholder="e.g., Bank transfer confirmed" style="width: 100%; padding: 0.75rem; border: 2px solid var(--border-color); border-radius: 8px;">
                </div>
                <button type="submit" class="btn btn-primary">Add Funds</button>
            </form>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = 'junestudioimagineai@gmail.com';
        let currentUser = null;

        // Check admin access
        function checkAdmin() {
            const savedUser = localStorage.getItem('currentUser');
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            
            currentUser = JSON.parse(savedUser);
            if (currentUser.role !== 'admin') {
                alert('Access denied. Admin only.');
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('admin-name').textContent = currentUser.businessName || currentUser.email;
            loadDashboard();
        }

        function loadDashboard() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');

            // Stats
            document.getElementById('total-users').textContent = users.length;
            document.getElementById('total-orders').textContent = orders.length;
            document.getElementById('pending-orders').textContent = orders.filter(o => o.status === 'pending').length;
            document.getElementById('total-revenue').textContent = orders.reduce((sum, o) => sum + o.total, 0).toFixed(2);

            // Users table
            const usersTable = document.getElementById('users-table');
            usersTable.innerHTML = users.map(user => `
                <tr>
                    <td>${user.email}</td>
                    <td>${user.businessName || '-'}</td>
                    <td>$${(user.balance || 0).toFixed(2)}</td>
                    <td><span class="badge ${user.role === 'admin' ? 'badge-completed' : 'badge-pending'}">${user.role}</span></td>
                    <td>
                        <button class="action-btn btn-approve" onclick="updateBalance(${user.id}, 10)">+$10</button>
                        <button class="action-btn btn-reject" onclick="updateBalance(${user.id}, -10)">-$10</button>
                    </td>
                </tr>
            `).join('');

            // Orders table
            const ordersTable = document.getElementById('orders-table');
            ordersTable.innerHTML = orders.map(order => `
                <tr>
                    <td>#${order.id.toString().slice(-6)}</td>
                    <td>${order.userId}</td>
                    <td>${order.service?.name || 'Unknown'}</td>
                    <td>${order.quantity}</td>
                    <td>$${order.total.toFixed(2)}</td>
                    <td><span class="badge badge-${order.status}">${order.status}</span></td>
                    <td>
                        ${order.status === 'pending' ? `
                            <button class="action-btn btn-approve" onclick="updateOrderStatus(${order.id}, 'completed')">Approve</button>
                            <button class="action-btn btn-reject" onclick="updateOrderStatus(${order.id}, 'cancelled')">Cancel</button>
                        ` : '-'}
                    </td>
                </tr>
            `).join('');

            // Fund user dropdown
            const fundSelect = document.getElementById('fund-user');
            fundSelect.innerHTML = users.map(user => `<option value="${user.id}">${user.email} (${user.businessName || 'No name'})</option>`).join('');
        }

        function updateBalance(userId, amount) {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.id === userId);
            if (userIndex !== -1) {
                users[userIndex].balance = (users[userIndex].balance || 0) + amount;
                localStorage.setItem('users', JSON.stringify(users));
                loadDashboard();
                alert(`Updated balance by $${amount}`);
            }
        }

        function addFunds(event) {
            event.preventDefault();
            const userId = parseInt(document.getElementById('fund-user').value);
            const amount = parseFloat(document.getElementById('fund-amount').value);
            const note = document.getElementById('fund-note').value;

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.id === userId);
            if (userIndex !== -1) {
                users[userIndex].balance = (users[userIndex].balance || 0) + amount;
                localStorage.setItem('users', JSON.stringify(users));
                
                // Log transaction
                const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
                transactions.push({
                    id: Date.now(),
                    userId,
                    amount,
                    note,
                    adminId: currentUser.id,
                    timestamp: new Date().toISOString()
                });
                localStorage.setItem('transactions', JSON.stringify(transactions));

                loadDashboard();
                alert(`Added $${amount} to user account. Note: ${note}`);
                document.getElementById('fund-amount').value = '';
                document.getElementById('fund-note').value = '';
            }
        }

        function updateOrderStatus(orderId, status) {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const orderIndex = orders.findIndex(o => o.id === orderId);
            if (orderIndex !== -1) {
                orders[orderIndex].status = status;
                localStorage.setItem('orders', JSON.stringify(orders));
                loadDashboard();
                alert(`Order marked as ${status}`);
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        // Theme toggle
        document.getElementById('theme-toggle')?.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        checkAdmin();
    </script>
</body>
</html>
